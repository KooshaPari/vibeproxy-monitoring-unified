name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '17 4 * * 1'

jobs:
  analyze:
    uses: KooshaPari/phenoShared/.github/workflows/reusable/codeql.yml@30358ce629168f0e1ec3699706cb73d1f77cb751
    permissions:
      contents: read
      actions: read
      security-events: write
    with:
      languages: '["javascript-typescript"]'
      build-mode: 'none'
